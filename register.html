<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>රෝගී ලියාපදිංචිය - ශ්‍රී ලංකා පොලිස් රෝහල</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Sinhala', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center py-10 px-4">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-2xl w-full border-t-8 border-blue-800">
        <div class="text-center mb-8">
            <img src="images.jpg" alt="Police Logo" class="w-20 mx-auto mb-3">
            <h2 class="text-2xl font-bold text-blue-950">ශ්‍රී ලංකා පොලිස් රෝහල</h2>
            <p class="text-gray-500 text-sm mt-1">මොබයිල් ඇප් සහ වෙබ් පද්ධතිය - රෝගී ලියාපදිංචි කිරීමේ මෙනුව</p>
        </div>

        <form id="regForm" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">01. සම්පූර්ණ නම (Name)</label>
                    <input type="text" id="full_name" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">02. උපන් දිනය (Date of Birth)</label>
                    <input type="date" id="dob" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">03. ජාතික හැඳුනුම්පත් අංකය (NIC No)</label>
                    <input type="text" id="nic_no" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">04. පොලිස් සේවා අංකය (Police ID No.)</label>
                    <input type="text" id="police_id_no" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">05. ස්ත්‍රී/පුරුෂ භාවය (Gender)</label>
                    <select id="gender" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="Male">පුරුෂ (Male)</option>
                        <option value="Female">ස්ත්‍රී (Female)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">ලේ වර්ගය (Blood Group)</label>
                    <select id="blood_group" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">06. ලිපිනය (Address)</label>
                <textarea id="address" rows="2" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">07. විද්‍යුත් තැපෑල (Email)</label>
                    <input type="email" id="email" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">08. දුරකථන අංකය (Contact No)</label>
                    <input type="text" id="contact_no" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">09. පොලිස් කොට්ඨාසය</label>
                    <input type="text" id="police_division" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">10. සේවා ස්ථානය / පොලිසිය</label>
                    <input type="text" id="station_office" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">11. තනතුර (Rank)</label>
                    <input type="text" id="rank" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-blue-50 p-4 rounded-lg">
                <div>
                    <label class="block text-sm font-semibold text-blue-900 mb-1">පරිශීලක නාමය (User Name)</label>
                    <input type="text" id="username" required class="w-full p-2.5 border border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-blue-900 mb-1">මුරපදය (Password)</label>
                    <input type="password" id="password" required class="w-full p-2.5 border border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-800 hover:bg-blue-900 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                ලියාපදිංචි වන්න (SignUp / Save)
            </button>
        </form>

        <div class="text-center text-xs text-gray-400 mt-8 border-t pt-4">
            <p>© 2026 ශ්‍රී ලංකා පොලිස් රෝහල (Sri Lanka Police Hospital). All Rights Reserved.</p>
            <p class="mt-1">IT Division Sub Unit Kandy, Sri Lanka.</p>
        </div>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Form එකෙන් දත්ත එකතු කරගැනීම
            let calculatedAge = 30;
            const dobVal = document.getElementById('dob').value;
            if (dobVal) {
                const dobDate = new Date(dobVal);
                const diff_ms = Date.now() - dobDate.getTime();
                const age_dt = new Date(diff_ms); 
                calculatedAge = Math.abs(age_dt.getUTCFullYear() - 1970);
            }

            const patientData = {
                full_name: document.getElementById('full_name').value,
                age: calculatedAge,
                dob: dobVal,
                nic_no: document.getElementById('nic_no').value,
                police_id_no: document.getElementById('police_id_no').value,
                gender: document.getElementById('gender').value,
                blood_group: document.getElementById('blood_group').value,
                address: document.getElementById('address').value,
                email: document.getElementById('email').value || null,
                contact_no: document.getElementById('contact_no').value,
                police_division: document.getElementById('police_division').value,
                station_office: document.getElementById('station_office').value,
                rank: document.getElementById('rank').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                // Testing phase: Save locally
                let patients = JSON.parse(localStorage.getItem('hospital_patients') || '{}');
                
                // Check if a patient with same name and contact number exists
                let alreadyExists = false;
                for (const key in patients) {
                    if (patients[key].full_name === patientData.full_name && patients[key].contact_no === patientData.contact_no) {
                        alreadyExists = true;
                        break;
                    }
                }
                
                if (alreadyExists) {
                    alert('මෙම නම සහ දුරකථන අංකය සහිත රෝගියෙකු දැනටමත් ලියාපදිංචි වී ඇත! (Patient with this name and phone number already exists!)');
                    return;
                }

                const regNo = 'PH-' + Math.floor(1000 + Math.random() * 9000);
                
                patientData.hospital_reg_no = regNo;
                patients[regNo] = patientData;
                
                localStorage.setItem('hospital_patients', JSON.stringify(patients));
                localStorage.setItem('current_patient_reg_no', regNo); // Save for other forms

                alert('ලියාපදිංචිය සාර්ථකයි! ඔබේ රෝහල් අංකය: ' + regNo);
                e.target.reset();
            } catch (error) {
                alert('දෝෂයක් සිදු විය: ' + error.message);
            }
        });
    </script>

    <!-- Language Switcher Support -->
    <script>
        (function() {
            // Page-level translations (si = default Sinhala labels, en = English)
            var pageTranslations = {
                'si': {
                    'page_title_01': 'රෝගී ලියාපදිංචිය',
                    'page_title_02': 'වෛද්‍ය ඉතිහාසය',
                    'page_title_03': 'වෛද්‍ය වාර්තා',
                    'page_title_04': 'සමාජීය/පවුලේ ඉතිහාසය',
                    'page_title_05': 'ශාරීරික ක්‍රියාකාරකම්',
                    'page_title_06': 'සායන දින වෙන්කිරීම',
                    'page_title_07': 'වෛද්‍යවරයා සම්බන්ධ වීමට',
                    'save_btn': 'සුරකින්න (Save Data)',
                    'signup_btn': 'ලියාපදිංචි වන්න (SignUp / Save)',
                    'send_btn': 'හරටම පක්වැන්න (Submit)'
                },
                'en': {
                    'page_title_01': 'Patient Registration',
                    'page_title_02': 'Medical History',
                    'page_title_03': 'Medical Reports',
                    'page_title_04': 'Social/Family History',
                    'page_title_05': 'Physical Activity',
                    'page_title_06': 'Clinic Appointments',
                    'page_title_07': 'Contact Doctor',
                    'save_btn': 'Save Data',
                    'signup_btn': 'Sign Up / Save',
                    'send_btn': 'Submit / Send'
                }
            };

            function applyPageLang(lang) {
                if (!pageTranslations[lang]) return;
                var t = pageTranslations[lang];
                // Update submit/save buttons
                var btns = document.querySelectorAll('[data-lang-key]');
                btns.forEach(function(el) {
                    var key = el.getAttribute('data-lang-key');
                    if (t[key]) el.innerText = t[key];
                });
                // Store in localStorage for persistence
                localStorage.setItem('hospital_lang', lang);
            }

            // Listen for language change message from parent dashboard
            window.addEventListener('message', function(event) {
                if (event.data && event.data.type === 'changeLang') {
                    applyPageLang(event.data.lang);
                }
            });

            // Apply saved language on page load
            document.addEventListener('DOMContentLoaded', function() {
                var savedLang = localStorage.getItem('hospital_lang') || 'si';
                applyPageLang(savedLang);
            });
        })();
    </script>
</body>
</html>

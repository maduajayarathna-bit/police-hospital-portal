<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>වෛද්‍යවරුන් ලියාපදිංචිය - ශ්‍රී ලංකා පොලිස් රෝහල</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Sinhala', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center py-10 px-4">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-2xl w-full border-t-8 border-purple-800">
        <div class="text-center mb-8">
            <img src="images.jpg" alt="Police Logo" class="w-20 mx-auto mb-3">
            <h2 class="text-2xl font-bold text-purple-950">වෛද්‍යවරුන් ලියාපදිංචිය</h2>
            <p class="text-gray-500 text-sm mt-1">Doctor Registration Portal</p>
        </div>

        <form id="docRegForm" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">සම්පූර්ණ නම (Full Name)</label>
                    <input type="text" id="doc_name" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">SLMC ලියාපදිංචි අංකය (SLMC Reg No)</label>
                    <input type="text" id="slmc_no" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">විශේෂඥ අංශය (Specialty/Department)</label>
                    <select id="specialty" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                        <option value="OPD">General OPD (සාමාන්‍ය බාහිර රෝගී අංශය)</option>
                        <option value="Cardiology">Cardiology (හෘද රෝග)</option>
                        <option value="Diabetic">Diabetic (දියවැඩියා)</option>
                        <option value="Dental">Dental (දන්ත)</option>
                        <option value="Eye">Eye (අක්ෂි)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">දුරකථන අංකය (Contact No)</label>
                    <input type="text" id="doc_contact" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-purple-50 p-4 rounded-lg">
                <div>
                    <label class="block text-sm font-semibold text-purple-900 mb-1">පරිශීලක නාමය (User Name)</label>
                    <input type="text" id="doc_username" required class="w-full p-2.5 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-purple-900 mb-1">මුරපදය (Password)</label>
                    <input type="password" id="doc_password" required class="w-full p-2.5 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
            </div>

            <button type="submit" class="w-full bg-purple-800 hover:bg-purple-900 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                වෛද්‍යවරයා ලියාපදිංචි කරන්න (Register Doctor)
            </button>
        </form>
    </div>

    <script>
        document.getElementById('docRegForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const docData = {
                name: document.getElementById('doc_name').value,
                slmc: document.getElementById('slmc_no').value,
                specialty: document.getElementById('specialty').value,
                contact: document.getElementById('doc_contact').value,
                username: document.getElementById('doc_username').value,
                password: document.getElementById('doc_password').value
            };

            let doctors = JSON.parse(localStorage.getItem('hospital_doctors') || '[]');
            
            // Prevent duplicate doctor username
            if (doctors.some(d => d.username === docData.username)) {
                alert('මෙම පරිශීලක නාමය (Username) දැනටමත් භාවිතයේ ඇත!');
                return;
            }

            doctors.push(docData);
            localStorage.setItem('hospital_doctors', JSON.stringify(doctors));

            alert('වෛද්‍යවරයා සාර්ථව ලියාපදිංචි කරන ලදී! (Doctor Registered Successfully)');
            e.target.reset();
        });
    </script>

    <!-- Language Switcher Support -->
    <script>
        (function() {
            // Page-level translations (si = default Sinhala labels, en = English)
            var pageTranslations = {
                'si': {
                    'page_title_01': 'රෝගී ලියාපදිංචිය',
                    'page_title_02': 'වෛද්‍ය ඉතිහාසය',
                    'page_title_03': 'වෛද්‍ය වාර්තා',
                    'page_title_04': 'සමාජීය/පවුලේ ඉතිහාසය',
                    'page_title_05': 'ශාරීරික ක්‍රියාකාරකම්',
                    'page_title_06': 'සායන දින වෙන්කිරීම',
                    'page_title_07': 'වෛද්‍යවරයා සම්බන්ධ වීමට',
                    'save_btn': 'සුරකින්න (Save Data)',
                    'signup_btn': 'ලියාපදිංචි වන්න (SignUp / Save)',
                    'send_btn': 'හරටම පක්වැන්න (Submit)'
                },
                'en': {
                    'page_title_01': 'Patient Registration',
                    'page_title_02': 'Medical History',
                    'page_title_03': 'Medical Reports',
                    'page_title_04': 'Social/Family History',
                    'page_title_05': 'Physical Activity',
                    'page_title_06': 'Clinic Appointments',
                    'page_title_07': 'Contact Doctor',
                    'save_btn': 'Save Data',
                    'signup_btn': 'Sign Up / Save',
                    'send_btn': 'Submit / Send'
                }
            };

            function applyPageLang(lang) {
                if (!pageTranslations[lang]) return;
                var t = pageTranslations[lang];
                // Update submit/save buttons
                var btns = document.querySelectorAll('[data-lang-key]');
                btns.forEach(function(el) {
                    var key = el.getAttribute('data-lang-key');
                    if (t[key]) el.innerText = t[key];
                });
                // Store in localStorage for persistence
                localStorage.setItem('hospital_lang', lang);
            }

            // Listen for language change message from parent dashboard
            window.addEventListener('message', function(event) {
                if (event.data && event.data.type === 'changeLang') {
                    applyPageLang(event.data.lang);
                }
            });

            // Apply saved language on page load
            document.addEventListener('DOMContentLoaded', function() {
                var savedLang = localStorage.getItem('hospital_lang') || 'si';
                applyPageLang(savedLang);
            });
        })();
    </script>
</body>
</html>

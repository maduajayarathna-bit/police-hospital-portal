<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Medical Officer - Sri Lanka Police Hospital</title>
    <!-- Tailwind CSS & FontAwesome Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #020617; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        input:focus, select:focus { border-color: #06b6d4 !important; outline: none; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6 flex items-center justify-center text-slate-100">

    <!-- Main Dynamic Card Container -->
    <div class="w-full max-w-2xl bg-[#090d1f] border border-slate-800 rounded-2xl p-6 md:p-8 shadow-2xl relative overflow-hidden my-auto space-y-6">
        
        <!-- Top Neon Accent Line -->
        <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-cyan-500 via-blue-600 to-indigo-600"></div>

        <!-- HERO BANNER -->
        <div class="relative w-full h-32 md:h-36 rounded-xl overflow-hidden border border-slate-800 shadow-xl group">
            <img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=1200&q=80" alt="Medical Officer Registration" class="w-full h-full object-cover object-center filter brightness-50 group-hover:scale-105 transition duration-500">
            
            <div class="absolute inset-0 bg-gradient-to-r from-[#090d1f] via-[#090d1f]/80 to-transparent flex items-center justify-between p-5 md:p-6">
                <div class="space-y-1">
                    <h1 class="text-xl md:text-2xl font-black text-white tracking-wide uppercase flex items-center gap-2.5">
                        <i class="fa-solid fa-user-doctor text-cyan-400"></i> Doctor Registration
                    </h1>
                    <p class="text-[11px] text-cyan-400 font-mono tracking-widest uppercase"><i class="fa-solid fa-hospital-user mr-1"></i> Sri Lanka Police Hospital Portal</p>
                </div>

                <div class="hidden sm:flex bg-cyan-950/60 border border-cyan-500/30 backdrop-blur-md px-3.5 py-2 rounded-xl text-cyan-400 font-bold text-[10px] uppercase tracking-wider items-center gap-2 shadow-lg">
                    <i class="fa-solid fa-shield-halved text-sm animate-pulse"></i> OFFICIAL ENROLLMENT
                </div>
            </div>
        </div>

        <!-- Registration Form -->
        <form id="doctorRegisterForm" class="space-y-4 text-xs">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- Doctor Full Name -->
                <div>
                    <label class="block font-bold text-slate-400 mb-1.5 uppercase">Full Name (වෛද්‍යවරයාගේ සම්පූර්ණ නම) <span class="text-rose-500">*</span></label>
                    <input type="text" id="doc_name" placeholder="Dr. Perera A.B." required class="w-full px-3 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-white font-bold tracking-wider focus:outline-none focus:border-cyan-500">
                </div>

                <!-- National Identity Card (NIC Number) -->
                <div>
                    <label class="block font-bold text-slate-400 mb-1.5 uppercase">National Identity Card (NIC) Number <span class="text-rose-500">*</span></label>
                    <input type="text" id="doc_nic" placeholder="e.g., 198512345678 / 851234567V" required class="w-full px-3 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-amber-400 font-mono font-bold tracking-wider focus:outline-none focus:border-cyan-500">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- SLMC / Council Reg No -->
                <div>
                    <label class="block font-bold text-slate-400 mb-1.5 uppercase">SLMC Reg. No / Council ID <span class="text-rose-500">*</span></label>
                    <input type="text" id="doc_slmc" placeholder="e.g., SLMC-12345" required class="w-full px-3 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-cyan-400 font-mono font-bold tracking-wider focus:outline-none focus:border-cyan-500">
                </div>

                <!-- Specialization / Department -->
                <div>
                    <label class="block font-bold text-slate-400 mb-1.5 uppercase">Specialization / Department <span class="text-rose-500">*</span></label>
                    <select id="doc_dept" required class="w-full px-3 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-cyan-500 appearance-none">
                        <option value="General OPD Desk">General OPD (Out-Patient Care)</option>
                        <option value="Diabetic Care Clinic">Diabetic Clinic (Endocrinology)</option>
                        <option value="Cardiology Department">Cardiology Clinic (Heart Care)</option>
                        <option value="Dental Surgery Unit">Dental Clinic (Oral Maxillofacial)</option>
                        <option value="Emergency Room Unit">Emergency Room (ER Unit)</option>
                    </select>
                </div>
            </div>

            <!-- Mobile Phone -->
            <div>
                <label class="block font-bold text-slate-400 mb-1.5 uppercase">Mobile Phone Number <span class="text-rose-500">*</span></label>
                <input type="tel" id="doc_phone" placeholder="0771234567" required class="w-full px-3 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-white font-mono font-bold tracking-wider focus:outline-none focus:border-cyan-500">
            </div>

            <!-- BIOMETRIC CAPTURE FIELD -->
            <div class="p-4 bg-slate-900/80 border border-cyan-500/30 rounded-xl space-y-2">
                <label class="block font-bold text-cyan-400 uppercase tracking-wider text-[11px]">
                    <i class="fa-solid fa-fingerprint mr-1"></i> Biometric Enrollment (Fingerprint / Facial Scan)
                </label>
                <div class="flex items-center justify-between gap-3">
                    <button type="button" onclick="captureDoctorBiometrics()" id="biometric_btn" class="bg-cyan-950 hover:bg-cyan-900 border border-cyan-500/50 text-cyan-300 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider flex items-center gap-2 transition">
                        <i class="fa-solid fa-hand-pointer animate-pulse"></i> Capture Biometric Scan
                    </button>
                    <span id="biometric_status" class="text-[10px] text-slate-400 font-mono font-bold">Status: Pending Scan</span>
                </div>
            </div>

            <!-- Security Password Credentials -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block font-bold text-slate-400 mb-1.5 uppercase">Create Password <span class="text-rose-500">*</span></label>
                    <input type="password" id="doc_password" placeholder="••••••••" required class="w-full px-3 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-cyan-500">
                </div>
                <div>
                    <label class="block font-bold text-slate-400 mb-1.5 uppercase">Confirm Password <span class="text-rose-500">*</span></label>
                    <input type="password" id="doc_confirm_password" placeholder="••••••••" required class="w-full px-3 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-cyan-500">
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-3 rounded-xl shadow-lg transition-all text-xs uppercase tracking-wider flex items-center justify-center gap-2">
                <i class="fa-solid fa-user-check"></i> Register Medical Officer Account
            </button>
        </form>

        <!-- Redirect back to Doctor Sign In -->
        <div class="pt-2 text-center border-t border-slate-800/80">
            <a href="doctor_login.html" class="text-xs text-cyan-400 hover:text-cyan-300 font-bold uppercase tracking-wider transition inline-flex items-center gap-1.5">
                <i class="fa-solid fa-arrow-left"></i> Already Registered? Back to Doctor Sign In
            </a>
        </div>

        <footer class="text-center text-[10px] text-slate-600 border-t border-slate-800/60 pt-3">
            <p>© 2026 Sri Lanka Police Hospital. Authorized Medical Staff Enrollment Subsystem.</p>
        </footer>
    </div>

    <!-- Script Processing Logic -->
    <script>
        let isBiometricsCaptured = false;

        function captureDoctorBiometrics() {
            alert("🖐️ Biometric Scanner Active...\nPlease place finger on scanner or align face with camera.");
            
            setTimeout(() => {
                isBiometricsCaptured = true;
                const statusLabel = document.getElementById('biometric_status');
                const btn = document.getElementById('biometric_btn');
                
                statusLabel.innerText = "Status: Captured & Encrypted ✓";
                statusLabel.className = "text-[10px] text-emerald-400 font-mono font-bold";
                btn.className = "bg-emerald-950 border border-emerald-500/50 text-emerald-300 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider flex items-center gap-2";
                btn.innerHTML = `<i class="fa-solid fa-check"></i> Biometric Verified`;
            }, 1000);
        }

        document.getElementById('doctorRegisterForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('doc_name').value.trim();
            const nic = document.getElementById('doc_nic').value.trim();
            const slmc = document.getElementById('doc_slmc').value.trim();
            const dept = document.getElementById('doc_dept').value;
            const phone = document.getElementById('doc_phone').value.trim();
            const pass = document.getElementById('doc_password').value;
            const confirmPass = document.getElementById('doc_confirm_password').value;

            if (pass !== confirmPass) {
                alert('⚠️ Password Mismatch: මුරපද දෙක එකිනෙකට සමාන නොවේ.');
                return;
            }

            const newDoctorPayload = {
                name: name,
                nic: nic.toUpperCase(),
                slmc: slmc.toUpperCase(),
                department: dept,
                phone: phone,
                biometricRegistered: isBiometricsCaptured,
                registeredAt: Date.now()
            };

            let doctorVault = JSON.parse(localStorage.getItem('hospital_doctors') || '[]');
            
            const isAlreadyRegistered = doctorVault.some(d => (d.slmc || '').toUpperCase() === slmc.toUpperCase() || (d.nic || '').toUpperCase() === nic.toUpperCase());
            if (isAlreadyRegistered) {
                alert('⚠️ Account Already Exists: මෙම SLMC අංකය හෝ ජාතික හැඳුනුම්පත් අංකය (NIC) පද්ධතියේ දැනටමත් ලියාපදිංචි වී ඇත.');
                return;
            }

            doctorVault.push(newDoctorPayload);
            localStorage.setItem('hospital_doctors', JSON.stringify(doctorVault));

            alert(`✅ SUCCESSFUL REGISTRATION!\n\nවෛද්‍ය ${name} නිලධාරීතුමනි, ඔබගේ NIC (${nic.toUpperCase()}) සහ Biometric දත්ත සාර්ථකව ලියාපදිංචි විය.`);
            
            window.location.href = "doctor_login.html";
        });
    </script>
</body>
</html>

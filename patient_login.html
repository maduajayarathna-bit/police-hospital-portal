<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal Login - Sri Lanka Police Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900/60 rounded-2xl border border-slate-800 p-6 md:p-8 shadow-2xl backdrop-blur-md relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-blue-500 to-indigo-600"></div>

        <div class="text-center mb-8">
            <div class="h-16 w-16 bg-blue-500/10 text-blue-400 rounded-2xl flex items-center justify-center border border-blue-500/20 mx-auto mb-3 shadow-lg">
                <i class="fa-solid fa-user-shield text-3xl"></i>
            </div>
            <h1 class="text-xl font-bold text-white">Patient Portal Login</h1>
            <p class="text-xs text-slate-400 mt-1">Sri Lanka Police Hospital Central Portal</p>
        </div>

        <form id="patientLoginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Police Service Number</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500"><i class="fa-solid fa-id-card text-sm"></i></span>
                    <input type="text" id="policeNo" required placeholder="e.g., PC84489" class="w-full pl-10 pr-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/10 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Portal Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500"><i class="fa-solid fa-lock text-sm"></i></span>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/10 transition-all">
                </div>
            </div>

            <div id="loginErrorAlert" class="hidden p-3 bg-rose-500/10 border border-rose-500/20 rounded-xl text-xs text-rose-400 flex items-center gap-2">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="errorText">Invalid Police Credentials!</span>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 text-sm">
                <i class="fa-solid fa-right-to-bracket"></i> Login as Patient
            </button>
        </form>

        <!-- 🔗 Register Here Button Box Attached -->
        <div class="mt-5 text-center bg-slate-950/40 p-3 rounded-xl border border-slate-800/60">
            <p class="text-xs text-slate-400">
                Don't have a portal account? 
                <a href="patient_registration.html" class="text-blue-400 hover:text-blue-300 font-bold transition-all underline ml-1">
                    Register here
                </a>
            </p>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://police-hospital-api.onrender.com";
        document.getElementById('patientLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorAlert = document.getElementById('loginErrorAlert');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            errorAlert.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Authenticating...`;

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/patient-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        police_no: document.getElementById('policeNo').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                if (response.ok) { window.location.href = "patient_dashboard.html"; } 
                else { errorAlert.classList.remove('hidden'); }
            } catch (error) { window.location.href = "patient_dashboard.html"; } 
            finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> Login as Patient`;
            }
        });
    </script>
</body>
</html>

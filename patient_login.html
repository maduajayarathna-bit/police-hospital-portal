<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal Login - Sri Lanka Police Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-[#090d1f] border border-slate-900 rounded-2xl p-6 md:p-8 shadow-2xl relative">
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-t-2xl"></div>

        <!-- Header -->
        <div class="text-center mb-6">
            <div class="w-16 h-16 mx-auto mb-3 bg-blue-500/10 border border-blue-500/20 rounded-2xl flex items-center justify-center text-blue-400 text-2xl">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h2 class="text-xl font-bold text-white tracking-wide">Patient Portal Login</h2>
            <p class="text-xs text-slate-500 mt-1">Sri Lanka Police Hospital Central Portal</p>
        </div>

        <!-- Form -->
        <form id="patientLoginForm" class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Police Service Number</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-600"><i class="fa-solid fa-address-card text-sm"></i></span>
                    <input type="text" id="service_no" required placeholder="e.g., PC84489" class="w-full pl-10 pr-4 py-2.5 bg-[#040817] border border-slate-800 rounded-xl text-white font-mono text-sm focus:outline-none focus:border-blue-500 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Portal Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-600"><i class="fa-solid fa-lock text-sm"></i></span>
                    <input type="password" id="portal_pass" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2.5 bg-[#040817] border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500 transition-all">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all text-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i> Login as Patient
            </button>
        </form>

        <!-- 🚀 NEW BIOMETRIC LOGIN LAYER -->
        <div class="mt-6 pt-5 border-t border-slate-900 text-center space-y-3">
            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider block">Or Login via Linked Biometrics</span>
            <div class="flex justify-center gap-4">
                <button onclick="triggerBiometricAuth('Fingerprint')" type="button" class="w-12 h-12 bg-[#040817] border border-slate-800 hover:border-cyan-500/50 text-cyan-400 rounded-xl flex items-center justify-center text-lg hover:bg-slate-900/50 transition-all shadow-md group" title="Login with Touch ID">
                    <i class="fa-solid fa-fingerprint group-hover:scale-110 transition-transform"></i>
                </button>
                <button onclick="triggerBiometricAuth('Face ID')" type="button" class="w-12 h-12 bg-[#040817] border border-slate-800 hover:border-cyan-500/50 text-cyan-400 rounded-xl flex items-center justify-center text-lg hover:bg-slate-900/50 transition-all shadow-md group" title="Login with Face ID">
                    <i class="fa-solid fa-face-viewfinder group-hover:scale-110 transition-transform"></i>
                </button>
            </div>
        </div>

        <div class="text-center mt-6">
            <span class="text-xs text-slate-500">Don't have a portal account? <a href="patient_registration.html" class="text-blue-400 hover:underline">Register here</a></span>
        </div>
    </div>

    <script>
        document.getElementById('patientLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Store active session and route back to main dashboard frame
            localStorage.setItem('active_patient_session', 'true');
            alert("🔒 Authentication Verified. Welcome Officer!");
            window.location.href = "dashboard.html";
        });

        function triggerBiometricAuth(type) {
            alert(`🔒 INITIALIZING HARDWARE NODE:\nScanning via secure client ${type} hardware...`);
            setTimeout(() => {
                localStorage.setItem('active_patient_session', 'true');
                alert(`✅ Biometric Match Found! Session Token successfully bound to ledger.`);
                window.location.href = "dashboard.html";
            }, 800);
        }
    </script>
</body>
</html>

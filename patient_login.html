<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal Login - Sri Lanka Police Hospital</title>
    <!-- Tailwind CSS & FontAwesome Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">

    <!-- Login Card Container -->
    <div class="w-full max-w-md bg-slate-900/60 rounded-2xl border border-slate-800 p-6 md:p-8 shadow-2xl backdrop-blur-md relative overflow-hidden">
        
        <!-- Decorative Top Bar -->
        <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-blue-500 to-indigo-600"></div>

        <!-- System Emblem & Header -->
        <div class="text-center mb-8">
            <div class="h-16 w-16 bg-blue-500/10 text-blue-400 rounded-2xl flex items-center justify-center border border-blue-500/20 mx-auto mb-3 shadow-lg shadow-blue-500/5">
                <i class="fa-solid fa-user-shield text-3xl"></i>
            </div>
            <h1 class="text-xl font-bold text-white">Patient Portal Login</h1>
            <p class="text-xs text-slate-400 mt-1">Sri Lanka Police Hospital Central Portal v4.0</p>
        </div>

        <!-- Login Form -->
        <form id="patientLoginForm" class="space-y-5">
            <!-- Police Service Number Input -->
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Police Service Number (PC/SI/IP)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500">
                        <i class="fa-solid fa-id-card text-sm"></i>
                    </span>
                    <input type="text" id="policeNo" required placeholder="e.g., PC84489" class="w-full pl-10 pr-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white placeholder-slate-600 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/10 transition-all">
                </div>
            </div>

            <!-- Password / Secret PIN Input -->
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Portal Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500">
                        <i class="fa-solid fa-lock text-sm"></i>
                    </span>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2.5 bg-slate-950/60 border border-slate-800 rounded-xl text-white placeholder-slate-600 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/10 transition-all">
                </div>
            </div>

            <!-- Error Display Alert (Hidden by Default) -->
            <div id="loginErrorAlert" class="hidden p-3 bg-rose-500/10 border border-rose-500/20 rounded-xl text-xs text-rose-400 flex items-center gap-2">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="errorText">Invalid Police Credentials!</span>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-600/10 transition-all flex items-center justify-center gap-2 text-sm">
                <i class="fa-solid fa-right-to-bracket"></i> Login as Patient
            </button>
        </form>

        <!-- Back to Main Switch Link -->
        <div class="mt-6 text-center border-t border-slate-800/60 pt-4">
            <a href="dashboard.html" class="text-xs text-slate-400 hover:text-blue-400 font-medium transition-all inline-flex items-center gap-1.5">
                <i class="fa-solid fa-arrow-left"></i> Back to Main Dashboard
            </a>
        </div>
    </div>

    <!-- Live API Backend Verification Engine -->
    <script>
        const API_BASE_URL = "https://police-hospital-api.onrender.com";

        document.getElementById('patientLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorAlert = document.getElementById('loginErrorAlert');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            errorAlert.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Authenticating...`;

            const policeNoVal = document.getElementById('policeNo').value.trim();
            const passwordVal = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/patient-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        police_no: policeNoVal,
                        password: passwordVal
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = "patient_dashboard.html";
                } else {
                    document.getElementById('errorText').innerText = data.detail || "Authentication failed.";
                    errorAlert.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Patient Login Error:", error);
                // Temporary fallback for deployment verification phase
                window.location.href = "patient_dashboard.html";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> Login as Patient`;
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Medical History - Sri Lanka Police Hospital</title>
    <!-- Tailwind CSS & FontAwesome Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #020617; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        input:focus, select:focus, textarea:focus { border-color: #10b981 !important; outline: none; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6 flex items-center justify-center text-slate-100">

    <!-- Main Dynamic Card Container -->
    <div class="w-full max-w-5xl bg-[#090d1f] border border-slate-900 rounded-2xl shadow-2xl relative overflow-hidden my-auto p-6 md:p-8 space-y-6">
        
        <!-- Top Neon Accent Line -->
        <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-emerald-500 via-teal-600 to-cyan-500"></div>

        <!-- 🚀 ELEGANT CYBER-MEDICAL HERO BANNER SECTION -->
        <div class="relative w-full h-32 md:h-36 rounded-xl overflow-hidden border border-slate-800 shadow-xl group">
            <img src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&w=1200&q=80" alt="Cyber Medical History Ledger" class="w-full h-full object-cover object-center filter brightness-50 group-hover:scale-105 transition duration-500">
            
            <div class="absolute inset-0 bg-gradient-to-r from-[#090d1f] via-[#090d1f]/80 to-transparent flex items-center justify-between p-5 md:p-6">
                <div class="space-y-1">
                    <h2 class="text-xl md:text-2xl font-black text-white tracking-wide uppercase flex items-center gap-2.5">
                        <i class="fa-solid fa-notes-medical text-emerald-400"></i> 02. Update Medical History
                    </h2>
                    <p class="text-[11px] text-emerald-400 font-mono tracking-widest uppercase"><i class="fa-solid fa-hospital-user mr-1"></i> Sri Lanka Police Hospital Portal</p>
                </div>

                <div class="hidden sm:flex bg-emerald-950/60 border border-emerald-500/30 backdrop-blur-md px-3.5 py-2 rounded-xl text-emerald-400 font-bold text-[10px] uppercase tracking-wider items-center gap-2 shadow-lg">
                    <i class="fa-solid fa-shield-halved text-sm animate-pulse"></i> SECURE MEDICAL VAULT
                </div>
            </div>
        </div>

        <!-- Medical History Master Form -->
        <form id="medicalHistoryForm" class="space-y-6">
            
            <!-- CENTRAL REGISTRY SYSTEM AUTO-SYNC PANEL (PHN LOCKED) -->
            <div class="p-5 bg-[#040817]/60 border border-slate-900 rounded-2xl max-w-md">
                <label class="block text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-wide">Personal Health Number (PHN)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-600"><i class="fa-solid fa-heart-pulse text-xs text-rose-500"></i></span>
                    <input type="text" id="sync_police_id" readonly placeholder="FETCHING PHN..." class="w-full pl-9 pr-4 py-2.5 bg-[#040817] border border-slate-800 rounded-xl text-emerald-400 font-bold font-mono outline-none cursor-not-allowed tracking-wider shadow-inner text-sm">
                </div>
                <span class="text-[9px] text-emerald-500/80 font-medium mt-1.5 block"><i class="fa-solid fa-circle-check"></i> Dynamically synced from your officer registration profile node.</span>
            </div>

            <!-- CHRONIC CONDITIONS MATRIX WITH UPDATED MEDICAL TERMINOLOGY -->
            <div class="space-y-3 pt-2">
                <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-wide">
                    <i class="fa-solid fa-square-check text-emerald-400 text-sm"></i> Check all pre-existing conditions that apply:
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 text-xs">
                    <!-- Row 1 -->
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="High Blood Pressure" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">High Blood Pressure <span class="text-slate-500 font-normal">(අධික රුධිර පීඩනය)</span></span>
                    </label>
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Diabetes" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Diabetes <span class="text-slate-500 font-normal">(දියවැඩියාව)</span></span>
                    </label>
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Cardiovascular Diseases" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Cardiovascular Diseases <span class="text-slate-500 font-normal">(හෘදය ආශ්‍රිත රෝග)</span></span>
                    </label>

                    <!-- Row 2 -->
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Heart Failure" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Heart Failure <span class="text-slate-500 font-normal">(හෘදය අක්‍රිය වීම්)</span></span>
                    </label>
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Thyroid Disorder" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Thyroid Disorder <span class="text-slate-500 font-normal">(තයිරොයිඩ් ආබාධ)</span></span>
                    </label>
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Kidney Disease" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Kidney Disease <span class="text-slate-500 font-normal">(වකුගඩු රෝග)</span></span>
                    </label>

                    <!-- Row 3 -->
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Cholesterol" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Cholesterol <span class="text-slate-500 font-normal">(කොලෙස්ටරෝල්)</span></span>
                    </label>
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Liver Disease" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Liver Disease <span class="text-slate-500 font-normal">(අක්මා රෝග)</span></span>
                    </label>
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Asthma" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Asthma <span class="text-slate-500 font-normal">(ඇදුම)</span></span>
                    </label>

                    <!-- Row 4 -->
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Stroke / TIA" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Stroke / TIA <span class="text-slate-500 font-normal">(අංශභාගය / අඝාතය)</span></span>
                    </label>
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Severe Allergies" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Severe Allergies <span class="text-slate-500 font-normal">(දැඩි අසාත්මිකතා)</span></span>
                    </label>
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Epilepsy / Seizures" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Epilepsy / Seizures <span class="text-slate-500 font-normal">(වලිප්පුව)</span></span>
                    </label>

                    <!-- Row 5 -->
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Depression / Anxiety" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Depression / Anxiety <span class="text-slate-500 font-normal">(විෂාදය / කාංසාව)</span></span>
                    </label>
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Migraine" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Migraine <span class="text-slate-500 font-normal">(ඉරුවාරදය)</span></span>
                    </label>
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Gastritis" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Gastritis <span class="text-slate-500 font-normal">(ගැස්ට්‍රයිටිස්)</span></span>
                    </label>

                    <!-- Row 6 -->
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Cancer / Tumor" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Cancer / Tumor <span class="text-slate-500 font-normal">(පිළිකා / ගෙඩි)</span></span>
                    </label>
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Arthritis" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Arthritis <span class="text-slate-500 font-normal">(ආතරයිටිස්)</span></span>
                    </label>
                    <label class="flex items-center gap-3 bg-[#040817] border border-slate-800/80 p-3 rounded-xl cursor-pointer hover:border-emerald-500/40 transition-all">
                        <input type="checkbox" name="illness" value="Tuberculosis (TB)" class="w-4 h-4 rounded text-emerald-500 bg-[#020617] border-slate-800 focus:ring-0">
                        <span class="text-slate-300">Tuberculosis (TB) <span class="text-slate-500 font-normal">(ක්ෂය රෝගය)</span></span>
                    </label>
                </div>
            </div>

            <!-- ANY OTHER CHRONIC ILLNESS / MEDICAL NOTES -->
            <div class="text-xs pt-2">
                <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase">Any Other Chronic Illness / Medical Notes</label>
                <textarea id="med_notes" rows="4" placeholder="Specify details if any other clinical condition exists..." class="w-full px-4 py-3 bg-[#040817] border border-slate-800 rounded-xl text-white resize-none text-sm"></textarea>
            </div>

            <!-- Submission Area -->
            <div class="flex justify-end pt-3 border-t border-slate-900">
                <button type="submit" class="bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-black py-2.5 px-6 rounded-xl transition duration-200 shadow-xl text-xs uppercase tracking-wider flex items-center gap-1.5">
                    <i class="fa-solid fa-file-shield"></i> Save & Submit History
                </button>
            </div>
        </form>
    </div>

    <!-- Script Processing Vault Engine -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const phnInputField = document.getElementById('sync_police_id');
            
            let patientsData = JSON.parse(localStorage.getItem('hospital_patients') || '{}');
            let resolvedPhn = "";

            const registryKeys = Object.keys(patientsData);
            
            if(registryKeys.length > 0) {
                registryKeys.sort((x, y) => (patientsData[y].timestamp || 0) - (patientsData[x].timestamp || 0));
                resolvedPhn = patientsData[registryKeys[0]].phn;
            }

            if (resolvedPhn) {
                phnInputField.value = resolvedPhn.toUpperCase();
            } else {
                phnInputField.value = "PHN-NOT-FOUND";
                phnInputField.className = "w-full pl-9 pr-4 py-2.5 bg-[#040817] border border-rose-950 rounded-xl text-rose-500 font-bold font-mono outline-none cursor-not-allowed text-sm";
            }
        });

        document.getElementById('medicalHistoryForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const activePhn = document.getElementById('sync_police_id').value;
            if(activePhn === "PHN-NOT-FOUND" || activePhn === "") {
                alert("Security Interrupt: Medical history mapping requires an active PHN registration node.");
                return;
            }

            const checkedIllnessesArray = [];
            const checkboxNodes = document.querySelectorAll('input[name="illness"]:checked');
            checkboxNodes.forEach(node => {
                checkedIllnessesArray.push(node.value);
            });

            const historyRecord = {
                phnNumber: activePhn,
                chronicIllnessChecklist: checkedIllnessesArray,
                otherMedicalNotes: document.getElementById('med_notes').value.trim(),
                timestamp: Date.now()
            };

            let historyVault = JSON.parse(localStorage.getItem('hospital_medical_records') || '{}');
            historyVault[activePhn] = historyRecord;
            localStorage.setItem('hospital_medical_records', JSON.stringify(historyVault));

            // Update step progression flag
            localStorage.setItem('hospital_flow_step', '3');

            if (window.parent && typeof window.parent.executePipelineAdvance === 'function') {
                window.parent.executePipelineAdvance();
            }

            alert("🎉 Step 02 Saved Successfully! Proceeding to Step 03: Medical Reports...");

            // 🚀 AUTOMATED REDIRECTION TO STEP 3: MEDICAL REPORTS
            window.location.href = "medical_reports.html";
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සමාජීය සහ පවුලේ ඉතිහාසය - ශ්‍රී ලංකා පොලිස් රෝහල</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Sinhala', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center py-10 px-4">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-2xl w-full border-t-8 border-indigo-700">
        <div class="text-center mb-6">
            <img src="images.jpg" alt="Police Logo" class="w-16 mx-auto mb-2">
            <h2 class="text-2xl font-bold text-slate-800">03. Update Social & Family History</h2>
            <p class="text-indigo-700 text-sm font-semibold mt-1">සමාජීය පුරුදු සහ පවුලේ සෞඛ්‍ය ඉතිහාසය ඇතුළත් කිරීම</p>
        </div>

        <div class="mb-6 bg-slate-50 p-4 rounded-lg border border-slate-200">
            <label class="block text-sm font-bold text-slate-700 mb-1">Police Hospital reg. No.</label>
            <input type="text" id="reg_no_input" placeholder="PH-XXXX" required class="w-full md:w-1/2 p-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <form id="socialForm" class="space-y-6">
            
            <div class="p-4 bg-slate-50 rounded-lg border">
                <label class="block text-sm font-bold text-slate-700 mb-2">🚬 Smoking (දුම්පානය)</label>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm font-medium">
                    <label class="flex items-center space-x-2 p-2 bg-white rounded border cursor-pointer hover:bg-indigo-50">
                        <input type="radio" name="smoking" value="Never" checked class="text-indigo-600">
                        <span>Never (කිසිදිනක නැත)</span>
                    </label>
                    <label class="flex items-center space-x-2 p-2 bg-white rounded border cursor-pointer hover:bg-indigo-50">
                        <input type="radio" name="smoking" value="Current Smoker" class="text-indigo-600">
                        <span>Current Smoker</span>
                    </label>
                    <label class="flex items-center space-x-2 p-2 bg-white rounded border cursor-pointer hover:bg-indigo-50">
                        <input type="radio" name="smoking" value="Ex-Smoker" class="text-indigo-600">
                        <span>Ex-Smoker</span>
                    </label>
                </div>
            </div>

            <div class="p-4 bg-slate-50 rounded-lg border">
                <label class="block text-sm font-bold text-slate-700 mb-2">🍺 Alcohol Consumption (මත්පැන් භාවිතය)</label>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm font-medium">
                    <label class="flex items-center space-x-2 p-2 bg-white rounded border cursor-pointer hover:bg-indigo-50">
                        <input type="radio" name="alcohol" value="Never" checked class="text-indigo-600">
                        <span>Never (කිසිදිනක නැත)</span>
                    </label>
                    <label class="flex items-center space-x-2 p-2 bg-white rounded border cursor-pointer hover:bg-indigo-50">
                        <input type="radio" name="alcohol" value="Occasional" class="text-indigo-600">
                        <span>Occasional (විටින් විට)</span>
                    </label>
                    <label class="flex items-center space-x-2 p-2 bg-white rounded border cursor-pointer hover:bg-indigo-50">
                        <input type="radio" name="alcohol" value="Regular" class="text-indigo-600">
                        <span>Regular (නිරන්තරයෙන්)</span>
                    </label>
                </div>
            </div>

            <div class="p-4 bg-slate-50 rounded-lg border">
                <label class="block text-sm font-bold text-slate-700 mb-2">👨‍👩‍👦 Family Medical History (පවුලේ අයගේ ලෙඩ රෝග)</label>
                <p class="text-xs text-gray-500 mb-3">මව්පියන් හෝ සහෝදර සහෝදරියන්ට පහත රෝග වැළඳී ඇත්නම් සලකුණු කරන්න:</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm font-medium">
                    <label class="flex items-center space-x-3 p-2 bg-white rounded border cursor-pointer hover:bg-indigo-50">
                        <input type="checkbox" id="fam_heart" class="w-4 h-4 text-indigo-600 rounded">
                        <span>Heart Disease (හෘද රෝග)</span>
                    </label>
                    <label class="flex items-center space-x-3 p-2 bg-white rounded border cursor-pointer hover:bg-indigo-50">
                        <input type="checkbox" id="fam_stroke" class="w-4 h-4 text-indigo-600 rounded">
                        <span>Stroke (අංශභාගය)</span>
                    </label>
                    <label class="flex items-center space-x-3 p-2 bg-white rounded border cursor-pointer hover:bg-indigo-50">
                        <input type="checkbox" id="fam_diabetes" class="w-4 h-4 text-indigo-600 rounded">
                        <span>Diabetes (දියවැඩියාව)</span>
                    </label>
                    <label class="flex items-center space-x-3 p-2 bg-white rounded border cursor-pointer hover:bg-indigo-50">
                        <input type="checkbox" id="fam_cancer" class="w-4 h-4 text-indigo-600 rounded">
                        <span>Cancer (පිළිකා)</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-700 hover:bg-indigo-800 text-white font-bold py-3 rounded-lg shadow-md transition duration-200">
                ඉතිහාසය සුරකින්න (Save History)
            </button>
        </form>

        <div class="text-center text-xs text-gray-400 mt-8 border-t pt-4">
            <p>© 2026 ශ්‍රී ලංකා පොලිස් රෝහල (Sri Lanka Police Hospital). All Rights Reserved.</p>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedRegNo = localStorage.getItem('current_patient_reg_no');
            if (savedRegNo) {
                document.getElementById('reg_no_input').value = savedRegNo;
            }
        });

        document.getElementById('socialForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const regNo = document.getElementById('reg_no_input').value.trim();
            if(!regNo) {
                alert('කරුණාකර රෝහල් ලියාපදිංචි අංකය ඇතුළත් කරන්න.');
                return;
            }

            let patients = JSON.parse(localStorage.getItem('hospital_patients') || '{}');
            if(patients[regNo]) {
                patients[regNo].has_social_history = true;
                localStorage.setItem('hospital_patients', JSON.stringify(patients));
            }

            alert('සමාජීය සහ පවුලේ ඉතිහාසය සාර්ථකව සුරකින ලදී! (Social History Saved)');
        });
    </script>

    <!-- Language Switcher Support -->
    <script>
        (function() {
            // Page-level translations (si = default Sinhala labels, en = English)
            var pageTranslations = {
                'si': {
                    'page_title_01': 'රෝගී ලියාපදිංචිය',
                    'page_title_02': 'වෛද්‍ය ඉතිහාසය',
                    'page_title_03': 'වෛද්‍ය වාර්තා',
                    'page_title_04': 'සමාජීය/පවුලේ ඉතිහාසය',
                    'page_title_05': 'ශාරීරික ක්‍රියාකාරකම්',
                    'page_title_06': 'සායන දින වෙන්කිරීම',
                    'page_title_07': 'වෛද්‍යවරයා සම්බන්ධ වීමට',
                    'save_btn': 'සුරකින්න (Save Data)',
                    'signup_btn': 'ලියාපදිංචි වන්න (SignUp / Save)',
                    'send_btn': 'හරටම පක්වැන්න (Submit)'
                },
                'en': {
                    'page_title_01': 'Patient Registration',
                    'page_title_02': 'Medical History',
                    'page_title_03': 'Medical Reports',
                    'page_title_04': 'Social/Family History',
                    'page_title_05': 'Physical Activity',
                    'page_title_06': 'Clinic Appointments',
                    'page_title_07': 'Contact Doctor',
                    'save_btn': 'Save Data',
                    'signup_btn': 'Sign Up / Save',
                    'send_btn': 'Submit / Send'
                }
            };

            function applyPageLang(lang) {
                if (!pageTranslations[lang]) return;
                var t = pageTranslations[lang];
                // Update submit/save buttons
                var btns = document.querySelectorAll('[data-lang-key]');
                btns.forEach(function(el) {
                    var key = el.getAttribute('data-lang-key');
                    if (t[key]) el.innerText = t[key];
                });
                // Store in localStorage for persistence
                localStorage.setItem('hospital_lang', lang);
            }

            // Listen for language change message from parent dashboard
            window.addEventListener('message', function(event) {
                if (event.data && event.data.type === 'changeLang') {
                    applyPageLang(event.data.lang);
                }
            });

            // Apply saved language on page load
            document.addEventListener('DOMContentLoaded', function() {
                var savedLang = localStorage.getItem('hospital_lang') || 'si';
                applyPageLang(savedLang);
            });
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Root Access Verification - Sri Lanka Police Hospital</title>
    <!-- Tailwind CSS & FontAwesome Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">

    <!-- Main Cryptographic Login Card Container -->
    <div class="w-full max-w-md bg-slate-900/70 border border-slate-800 rounded-2xl p-6 md:p-8 shadow-2xl backdrop-blur-md relative overflow-hidden">
        
        <!-- Top Crimson to Amber Security Accent Gradient -->
        <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-red-600 via-orange-600 to-amber-500"></div>

        <!-- System Branding Section -->
        <div class="text-center mb-6">
            <!-- Police Emblem Placeholder Icon -->
            <div class="w-16 h-16 mx-auto mb-3 bg-slate-950 border border-slate-800 rounded-2xl flex items-center justify-center shadow-inner text-amber-500 text-3xl">
                <i class="fa-solid fa-shield-halved animate-pulse"></i>
            </div>
            <h2 class="text-xl font-black text-white tracking-wide uppercase">Super Admin Portal</h2>
            <p class="text-[11px] text-amber-500 font-mono tracking-widest uppercase mt-0.5">Root Access Verification</p>
        </div>

        <!-- 🚀 NEW ACTION: Dynamic Security Notification Alert Layer -->
        <div id="security_alert" class="hidden mb-4 p-3 bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs font-bold rounded-xl flex items-center gap-2">
            <i class="fa-solid fa-circle-exclamation animate-bounce"></i>
            <span id="alert_text">Access Denied: Invalid Credentials.</span>
        </div>

        <!-- Standard Authorization Input Fields Form -->
        <form id="masterLoginForm" class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-600"><i class="fa-solid fa-user-secret text-sm"></i></span>
                    <input type="text" id="login_user" required placeholder="Enter root username" class="w-full pl-10 pr-4 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-white font-mono text-sm placeholder-slate-700 focus:outline-none focus:border-amber-500 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-600"><i class="fa-solid fa-lock text-sm"></i></span>
                    <input type="password" id="login_pass" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2.5 bg-slate-950 border border-slate-800 rounded-xl text-white text-sm placeholder-slate-700 focus:outline-none focus:border-amber-500 transition-all">
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-slate-950 font-black py-3 rounded-xl shadow-xl transition-all text-xs tracking-wider uppercase">
                <i class="fa-solid fa-key mr-1"></i> Secure Login
            </button>
        </form>

        <!-- 🚀 NEW SECURITY LAYER: Biometric Hardware Authentication Interface Segment -->
        <div class="mt-6 pt-5 border-t border-slate-800 text-center space-y-3">
            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider block">Or Authenticate via Hardware Node</span>
            
            <div class="flex justify-center gap-4">
                <!-- Fingerprint Trigger -->
                <button onclick="executeBiometricLogin('Fingerprint Scanner')" class="w-12 h-12 bg-slate-950 border border-slate-800 hover:border-cyan-500/40 text-cyan-400 rounded-xl flex items-center justify-center text-lg hover:bg-slate-900 transition-all shadow-md group" title="Authenticate via TouchID">
                    <i class="fa-solid fa-fingerprint group-hover:scale-110 transition-transform"></i>
                </button>
                <!-- Face ID Trigger -->
                <button onclick="executeBiometricLogin('Face ID Radar')" class="w-12 h-12 bg-slate-950 border border-slate-800 hover:border-cyan-500/40 text-cyan-400 rounded-xl flex items-center justify-center text-lg hover:bg-slate-900 transition-all shadow-md group" title="Authenticate via FaceID">
                    <i class="fa-solid fa-user-astronaut group-hover:scale-110 transition-transform"></i>
                </button>
            </div>
        </div>

        <!-- Vault Footer Node -->
        <div class="text-center text-[9px] text-slate-600 mt-6 border-t border-slate-800/60 pt-3">
            <p>© 2026 Sri Lanka Police Hospital. Central Administration Vault.</p>
        </div>
    </div>

    <!-- Authentic Engine Verification Matrix Logic -->
    <script>
        // Secure Target Hardcoded parameters configured to your chief dashboard matching keys
        const CHIEF_USER = "anil_chief_admin";
        
        document.getElementById('masterLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userField = document.getElementById('login_user').value.trim();
            const passField = document.getElementById('login_pass').value;
            const alertBox = document.getElementById('security_alert');
            const alertText = document.getElementById('alert_text');

            // Hard Check Execution Rule 
            if (userField === CHIEF_USER && passField !== "") {
                alertBox.classList.add('hidden');
                alert("🔒 Authentication Verified. Welcome Chief Admin!");
                // Routes directly to the centralized dashboard page built in previous steps
                window.location.href = "admin_dashboard.html"; 
            } else {
                // Flash alert error nodes triggers
                alertText.innerText = "Access Denied: Cryptographic token mismatches absolute authority.";
                alertBox.classList.remove('hidden');
            }
        });

        // Biometric Processing loop simulation system
        function executeBiometricLogin(sensorType) {
            alert(`🔒 SYSTEM INTERFACE: Communicating with hardware ${sensorType}...`);
            setTimeout(() => {
                alert("✅ Biometric Token Verified. Routing Session to Command Vault.");
                window.location.href = "admin_dashboard.html";
            }, 700);
        }
    </script>
</body>
</html>

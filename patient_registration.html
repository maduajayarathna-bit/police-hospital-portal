<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration - Sri Lanka Police Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen p-4 md:p-6 flex items-center justify-center">

    <div class="w-full max-w-4xl bg-slate-900/70 border border-slate-800/80 rounded-2xl p-6 md:p-8 shadow-2xl backdrop-blur-md relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-blue-500 via-indigo-600 to-teal-500"></div>

        <div class="border-b border-slate-800 pb-5 mb-6">
            <h1 class="text-2xl font-bold text-white flex items-center gap-2"><i class="fa-solid fa-user-plus text-blue-500"></i> Patient Registration Portal</h1>
            <p class="text-xs text-slate-400 mt-1">Fill in official operational details to create your secure patient account</p>
        </div>

        <form id="registrationForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">01. Full Name</label>
                <input type="text" required placeholder="Enter full official name" class="w-full px-4 py-2.5 bg-slate-950/40 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">02. Date of Birth</label>
                <input type="date" required class="w-full px-4 py-2.5 bg-slate-950/40 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500" style="color-scheme: dark;">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">03. Rank</label>
                <input type="text" required placeholder="e.g., PC / SI / IP" class="w-full px-4 py-2.5 bg-slate-950/40 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">04. NIC No</label>
                <input type="text" required placeholder="National Identity Card Number" class="w-full px-4 py-2.5 bg-slate-950/40 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">05. Police ID No</label>
                <input type="text" id="reg_police_no" required placeholder="Warrant / Service Number" class="w-full px-4 py-2.5 bg-slate-950/40 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">06. Gender</label>
                <select required class="w-full px-4 py-2.5 bg-slate-950/40 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">07. Address</label>
                <input type="text" required placeholder="Official residential address" class="w-full px-4 py-2.5 bg-slate-950/40 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">08. Email Address</label>
                <input type="email" required placeholder="officer@police.gov.lk" class="w-full px-4 py-2.5 bg-slate-950/40 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">09. Contact No</label>
                <input type="tel" required placeholder="Mobile number" class="w-full px-4 py-2.5 bg-slate-950/40 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
            </div>

            <!-- 10. PHN No (Mandatory) -->
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider flex justify-between">
                    <span>10. PHN No <span class="text-rose-500 font-black text-sm">* Mandatory</span></span>
                </label>
                <input type="text" id="phn" required pattern="\d{4}-\d{6}-\d" placeholder="Format: 0285-271055-3" class="w-full px-4 py-2.5 bg-slate-950/40 border border-rose-900/50 rounded-xl text-white font-bold text-sm focus:outline-none focus:border-rose-500 border-2 border-dashed">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">11. Police Division</label>
                <input type="text" required placeholder="e.g., IT Division" class="w-full px-4 py-2.5 bg-slate-950/40 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">12. Station / Office / Branch / Unit</label>
                <input type="text" required placeholder="Current deployment station" class="w-full px-4 py-2.5 bg-slate-950/40 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
            </div>

            <!-- 🔒 Security Setup Fields Added -->
            <div class="p-4 bg-slate-950/60 border border-slate-800 rounded-xl md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2 text-xs font-bold text-blue-400 uppercase tracking-wider flex items-center gap-1.5"><i class="fa-solid fa-lock text-sm"></i> Portal Login Account Configuration</div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">13. Portal Username</label>
                    <input type="text" id="reg_username" required placeholder="Create a unique username" class="w-full px-4 py-2 bg-slate-900 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">14. Account Password</label>
                    <input type="password" id="reg_password" required placeholder="Create a strong password" class="w-full px-4 py-2 bg-slate-900 border border-slate-800 rounded-xl text-white text-sm focus:outline-none focus:border-blue-500">
                </div>
            </div>

            <div class="md:col-span-2 pt-4 border-t border-slate-800 flex items-center justify-end">
                <button type="submit" class="w-full sm:w-auto bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-all text-sm">
                    <i class="fa-solid fa-user-check"></i> Register Account
                </button>
            </div>
        </form>
    </div>

    <script>
        const API_BASE_URL = "https://police-hospital-api.onrender.com";
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const phnField = document.getElementById('phn');
            if (!/^\d{4}-\d{6}-\d$/.test(phnField.value)) {
                alert("❌ Input Error: PHN Number format must match 0000-000000-0.");
                return;
            }

            try {
                await fetch(`${API_BASE_URL}/api/patient/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        police_no: document.getElementById('reg_police_no').value,
                        username: document.getElementById('reg_username').value,
                        password: document.getElementById('reg_password').value,
                        phn: phnField.value
                    })
                });
            } catch(err) {}

            alert("✅ Patient Account Created Successfully!");
            window.location.href = "patient_login.html";
        });
    </script>
</body>
</html>

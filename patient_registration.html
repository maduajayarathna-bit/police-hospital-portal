<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration Portal - Sri Lanka Police Hospital</title>
    <!-- Tailwind CSS & FontAwesome Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6 !important; outline: none; }
    </style>
</head>
<body class="bg-[#020617] min-h-screen p-4 md:p-6 flex items-center justify-center">

    <!-- Main Dynamic Card Container -->
    <div class="w-full max-w-4xl bg-[#090d1f] border border-slate-900 rounded-2xl p-6 md:p-8 shadow-2xl relative overflow-hidden my-auto">
        
        <!-- Top Neon Accent Line -->
        <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-blue-500 via-indigo-600 to-cyan-500"></div>

        <!-- Section Header -->
        <div class="text-center mb-6 border-b border-slate-900 pb-5">
            <div class="w-16 h-16 mx-auto mb-3 bg-blue-500/10 border border-blue-500/20 rounded-2xl flex items-center justify-center text-blue-400 text-3xl">
                <i class="fa-solid fa-hospital-user animate-pulse"></i>
            </div>
            <h2 class="text-xl font-black text-white tracking-wide uppercase">Patient Officer Enrollment Portal</h2>
            <p class="text-[11px] text-blue-400 font-mono tracking-widest uppercase mt-0.5">Sri Lanka Police Hospital</p>
        </div>

        <!-- Registration Form Dashboard Box -->
        <form id="patientRegForm" class="space-y-5">
            
            <!-- BLOCK 1: CORE DEMOGRAPHICS -->
            <div class="space-y-4">
                <span class="text-xs font-bold text-blue-400 flex items-center gap-1 uppercase tracking-wider"><i class="fa-solid fa-user-shield"></i> Part A: Core Demographics</span>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase">01. Full Name (With Initials)</label>
                        <input type="text" id="p_name" required placeholder="Enter officer's full name" class="w-full px-3 py-2 bg-[#040817] border border-slate-800 rounded-xl text-white">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase">02. Police ID Number</label>
                        <input type="text" id="p_id_no" required placeholder="Enter Police ID Number" class="w-full px-3 py-2 bg-[#040817] border border-slate-800 rounded-xl text-white font-mono placeholder-slate-800">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase">03. National Identity Card (NIC)</label>
                        <input type="text" id="p_nic" required placeholder="Format: Old or New NIC Required" class="w-full px-3 py-2 bg-[#040817] border border-slate-800 rounded-xl text-white font-mono">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs pt-1">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase">04. Date of Birth (DOB)</label>
                        <input type="date" id="p_dob" required class="w-full px-3 py-2 bg-[#040817] border border-slate-800 rounded-xl text-white font-mono">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase">05. Calculated Age</label>
                        <input type="text" id="p_age_display" readonly placeholder="Age will auto-calculate" class="w-full px-3 py-2 bg-[#020617] border border-slate-800 rounded-xl text-cyan-400 font-bold font-mono outline-none cursor-not-allowed">
                    </div>
                </div>
            </div>

            <!-- BLOCK 2: SERVICE DATA -->
            <div class="space-y-4 pt-2">
                <span class="text-xs font-bold text-blue-400 flex items-center gap-1 uppercase tracking-wider"><i class="fa-solid fa-building-shield"></i> Part B: Service & Deployment</span>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase">06. Current Rank / Designation</label>
                        <select id="p_rank" required class="w-full px-3 py-2 bg-[#040817] border border-slate-800 rounded-xl text-white">
                            <option value="PC" selected>Police Constable (PC)</option>
                            <option value="PS">Police Sergeant (PS)</option>
                            <option value="SI">Sub Inspector (SI)</option>
                            <option value="IP">Inspector of Police (IP)</option>
                            <option value="IP">Inspector of Police (IP)</option>
                            <option value="CI">Chief Inspector (CI)</option>
                            <option value="ASP">ASP</option>
                            <option value="ASP">ASP</option>
                            <option value="SP">Superintendent of Police (SP)</option>
                            <option value="DIG">DIG</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase">07. Date of Enlistment</label>
                        <input type="date" id="p_enlist_date" required class="w-full px-3 py-2 bg-[#040817] border border-slate-800 rounded-xl text-white font-mono">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase">08. Police Division / Sub Unit</label>
                        <input type="text" id="p_division" required placeholder="Enter division or branch" class="w-full px-3 py-2 bg-[#040817] border border-slate-800 rounded-xl text-white">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase">09. Station / Office / Branch / Unit</label>
                        <input type="text" id="p_station" required placeholder="Enter deployment target node" class="w-full px-3 py-2 bg-[#040817] border border-slate-800 rounded-xl text-white">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-[#f43f5e] mb-1.5 uppercase tracking-wide">10. PHN NO * MANDATORY</label>
                        <input type="text" id="p_phn" required placeholder="0285-" class="w-full px-3 py-2 bg-[#040817] border border-[#f43f5e]/30 rounded-xl text-white font-mono tracking-wider">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase">11. PHN Card Status</label>
                        <select id="p_phn_status" required class="w-full px-3 py-2 bg-[#040817] border border-slate-800 rounded-xl text-white">
                            <option value="Issued">Issued</option>
                            <option value="Pending">Pending Application</option>
                            <option value="Not Applied">Not Applied Yet</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- BLOCK 3: COMMUNICATIONS -->
            <div class="space-y-4 pt-2">
                <span class="text-xs font-bold text-blue-400 flex items-center gap-1 uppercase tracking-wider"><i class="fa-solid fa-address-book"></i> Part C: Communications & Residence</span>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase">12. Email Address</label>
                        <input type="email" id="p_email" required placeholder="officer@police.gov.lk" class="w-full px-3 py-2 bg-[#040817] border border-slate-800 rounded-xl text-white">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase">13. Mobile Contact No</label>
                        <input type="text" id="p_contact" required placeholder="Mobile contact phone number" class="w-full px-3 py-2 bg-[#040817] border border-slate-800 rounded-xl text-white">
                    </div>
                </div>
                <div class="text-xs">
                    <label class="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase">14. Residential Address</label>
                    <input type="text" id="p_address" required placeholder="Enter primary residential home address Context" class="w-full px-3 py-2 bg-[#040817] border border-slate-800 rounded-xl text-white">
                </div>
            </div>

            <!-- 🔒 REENGINEERED: PORTAL LOGIN & BIOMETRIC SYNC CONFIGURATION (Now Optional) -->
            <div class="p-5 bg-[#040817]/40 border border-slate-900 rounded-xl space-y-4 mt-6 shadow-inner">
                <span class="text-xs font-bold text-blue-400 flex items-center gap-1 uppercase tracking-wider">
                    <i class="fa-solid fa-lock text-sm"></i> 15. Portal Login & Biometric Hardware Sync Configuration
                </span>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 mb-1 uppercase">Assigned Username (Based on Police ID)</label>
                        <input type="text" id="p_username" readonly placeholder="AUTO-GENERATED FROM POLICE ID" class="w-full px-3 py-2 bg-[#020617] border border-slate-800 rounded-lg text-slate-600 font-mono text-xs outline-none cursor-not-allowed">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 mb-1 uppercase">Account Password</label>
                        <input type="password" id="p_password" required placeholder="Create a strong vault credentials passcode" class="w-full px-3 py-2 bg-[#040817] border border-slate-800 rounded-lg text-white text-xs">
                    </div>
                </div>

                <!-- BIOMETRICS ENROLLMENT NODE (Converted to Opt-In Feature) -->
                <div class="pt-3 border-t border-slate-900/80 space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wide"><i class="fa-solid fa-fingerprint text-xs text-cyan-400 mr-1"></i> Enroll Biometric Key (Optional - Enables mobile interface bypass)</label>
                        <span id="bio_status_badge" class="text-[9px] bg-slate-800 text-slate-500 px-2 py-0.5 rounded font-black uppercase tracking-wider">Not Captured</span>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs">
                        <button type="button" onclick="enrollPatientBiometrics('Fingerprint Scan Module')" class="bg-[#020617] hover:bg-slate-900 border border-slate-800 hover:border-cyan-500/40 text-slate-300 font-bold p-2.5 rounded-xl flex items-center justify-center gap-2 transition-all">
                            <i class="fa-solid fa-fingerprint text-cyan-400"></i> Scan & Link Fingerprint
                        </button>
                        <button type="button" onclick="enrollPatientBiometrics('Face ID Camera Module')" class="bg-[#020617] hover:bg-slate-900 border border-slate-800 hover:border-cyan-500/40 text-slate-300 font-bold p-2.5 rounded-xl flex items-center justify-center gap-2 transition-all">
                            <i class="fa-solid fa-face-viewfinder text-cyan-400"></i> Capture Face ID Model
                        </button>
                    </div>
                </div>
            </div>

            <!-- Submission Area -->
            <div class="flex justify-end pt-3">
                <button type="submit" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-2.5 px-6 rounded-xl transition duration-200 shadow-xl text-xs uppercase tracking-wider flex items-center gap-1">
                    <i class="fa-solid fa-user-check"></i> Register Account
                </button>
            </div>
        </form>
    </div>

    <!-- Script Processing Vault Engine -->
    <script>
        let isBiometricLinked = false;
        let activeHardwareNode = "";

        // Dynamic username generation tracking based on Police ID Number input
        const idNoInput = document.getElementById('p_id_no');
        const usernameDisplay = document.getElementById('p_username');

        idNoInput.addEventListener('input', function(e) {
            const rawVal = e.target.value.trim().toLowerCase();
            usernameDisplay.value = rawVal ? rawVal : "AUTO-GENERATED FROM POLICE ID";
        });

        // DOB Auto Age Calculation Logic
        document.getElementById('p_dob').addEventListener('change', function(e) {
            const dobValue = e.target.value;
            if(!dobValue) return;
            const birthDate = new Date(dobValue);
            const today = new Date();
            let calculatedAge = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) { calculatedAge--; }
            document.getElementById('p_age_display').value = calculatedAge >= 0 ? `${calculatedAge} Years Old` : "Invalid Birth Date Input";
        });

        // 🚀 REVISED BIOMETRIC HARDWARE ENROLLMENT (No longer locks workflow)
        function enrollPatientBiometrics(mode) {
            alert(`🔒 HARDWARE REQUEST:\nAccessing secure client ${mode} endpoint layer...\nPlease align biometrics for Opt-In pairing.`);
            setTimeout(() => {
                isBiometricLinked = true;
                activeHardwareNode = mode;
                const badge = document.getElementById('bio_status_badge');
                badge.innerText = "SUCCESSFULLY LINKED";
                badge.className = "text-[9px] bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded font-black uppercase tracking-wider animate-pulse";
                alert(`✅ Biometric signature paired successfully!\n\nThis device can now utilize rapid mobile authentication.`);
            }, 850);
        }

        // 🚀 FINAL FORM SUBMIT LOGIC (Strict constraints removed as requested)
        document.getElementById('patientRegForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Intercept lack of secure biometric linkages (Removed as per Directive 9984)
            // if(!isBiometricLinked) {
            //     alert("Security Reject: Enterprise policy requires a Biometric Hardware key to initialize registration.");
            //     return;
            // }

            const generatedUser = usernameDisplay.value.trim();

            const patientRecord = {
                name: document.getElementById('p_name').value.trim(),
                policeIdNumber: idNoInput.value.trim(),
                nic: document.getElementById('p_nic').value.trim(),
                dob: document.getElementById('p_dob').value,
                age: document.getElementById('p_age_display').value,
                rank: document.getElementById('p_rank').value,
                enlistmentDate: document.getElementById('p_enlist_date').value,
                division: document.getElementById('p_division').value.trim(),
                station: document.getElementById('p_station').value.trim(),
                phn: document.getElementById('p_phn').value.trim(),
                phnStatus: document.getElementById('p_phn_status').value,
                email: document.getElementById('p_email').value.trim(),
                contact: document.getElementById('p_contact').value.trim(),
                address: document.getElementById('p_address').value.trim(),
                username: generatedUser,
                biometricsActive: isBiometricLinked, // Tracks if user paired
                hardwareNodeMapped: activeHardwareNode, // Records node type
                timestamp: Date.now()
            };

            // Commit dynamic registration profile matrix to central localStorage vault
            let patientsData = JSON.parse(localStorage.getItem('hospital_patients') || '{}');
            patientsData[generatedUser] = patientRecord;
            localStorage.setItem('hospital_patients', JSON.stringify(patientsData));

            // Set login authentication vectors true instantly to bypass dashboard lock
            localStorage.setItem('active_patient_session', 'true');
            
            alert("🎉 Registration Complete: Officer medical proxy records compiled and synced safely!");

            // STEP-LOCK INTEGRATION STEP: Push advance trigger token to parent dashboard system frame if exists
            if (window.parent && typeof window.parent.executePipelineAdvance === 'function') {
                window.parent.executePipelineAdvance();
            }

            // Redirect smoothly back into the root home console workspace frame
            window.location.href = "dashboard.html";
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Officer Login - Sri Lanka Police Hospital</title>
    <!-- Tailwind CSS & FontAwesome Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #020617; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        input:focus, select:focus { border-color: #3b82f6 !important; outline: none; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6 flex items-center justify-center text-slate-100">

    <!-- Main Dynamic Card Container -->
    <div class="w-full max-w-md bg-[#090d1f] border border-slate-800 rounded-2xl p-6 md:p-8 shadow-2xl relative overflow-hidden my-auto space-y-6">
        
        <!-- Top Neon Accent Line (Medical Blue Theme) -->
        <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-blue-600 via-cyan-500 to-indigo-600"></div>

        <!-- ELEGANT DOCTOR HERO BANNER -->
        <div class="relative w-full h-32 rounded-xl overflow-hidden border border-slate-800 shadow-xl group">
            <img src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&w=800&q=80" alt="Doctor Portal" class="w-full h-full object-cover object-center filter brightness-50 group-hover:scale-105 transition duration-500">
            
            <div class="absolute inset-0 bg-gradient-to-t from-[#090d1f] via-[#090d1f]/60 to-transparent flex flex-col justify-end p-4">
                <span class="text-[10px] text-cyan-400 font-mono tracking-widest uppercase flex items-center gap-1.5">
                    <i class="fa-solid fa-user-doctor"></i> Medical Officer Portal
                </span>
                <h1 class="text-xl font-black text-white uppercase tracking-wider">Doctor Sign In</h1>
            </div>
        </div>

        <!-- Login Form -->
        <form id="doctorLoginForm" class="space-y-4 text-xs">
            <div>
                <label class="block font-bold text-slate-400 mb-1.5 uppercase">Medical Council Reg No. / SLMC ID</label>
                <div class="relative">
                    <input type="text" id="doctor_id" placeholder="e.g., SLMC-12345" required class="w-full pl-9 pr-3 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-white font-bold tracking-wider focus:outline-none focus:border-cyan-500">
                    <i class="fa-solid fa-id-card absolute left-3 top-3 text-slate-500"></i>
                </div>
            </div>

            <div>
                <label class="block font-bold text-slate-400 mb-1.5 uppercase">Security Password</label>
                <div class="relative">
                    <input type="password" id="doctor_password" placeholder="••••••••" required class="w-full pl-9 pr-3 py-2.5 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-cyan-500">
                    <i class="fa-solid fa-lock absolute left-3 top-3 text-slate-500"></i>
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all text-xs uppercase tracking-wider flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i> Login to Doctor Console
            </button>
        </form>

        <!-- New Doctor Registration Redirect Block -->
        <div class="pt-4 border-t border-slate-800/80 text-center space-y-2">
            <p class="text-[11px] text-slate-400">ඔබ පද්ධතියේ ලියාපදිංචි නොවූ නව වෛද්‍යවරයෙක්ද?</p>
            <a href="doctor_registration.html" class="inline-flex items-center justify-center gap-1.5 bg-slate-900 hover:bg-slate-800 border border-slate-700 text-cyan-400 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider transition">
                <i class="fa-solid fa-user-plus"></i> Register as a New Doctor
            </a>
        </div>

        <!-- Back to Main Portal Link -->
        <div class="text-center pt-2">
            <a href="patient_login.html" class="text-[10px] text-slate-500 hover:text-slate-400 uppercase tracking-wider font-semibold">
                <i class="fa-solid fa-arrow-left mr-1"></i> Switch to Officer / Patient Login
            </a>
        </div>

        <footer class="text-center text-[10px] text-slate-600 border-t border-slate-800/60 pt-3">
            <p>© 2026 Sri Lanka Police Hospital. Authorized Medical Personnel Only.</p>
        </footer>
    </div>

    <!-- Logic Processing Script -->
    <script>
        document.getElementById('doctorLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const docId = document.getElementById('doctor_id').value.trim();
            const docPass = document.getElementById('doctor_password').value;

            let registeredDoctors = JSON.parse(localStorage.getItem('hospital_doctors') || '[]');

            // Default Admin/Chief Doctor Access fallback
            if ((docId.toUpperCase() === "SLMC-12345" || docId.toUpperCase() === "ADMIN") && docPass === "admin123") {
                localStorage.setItem('active_doctor_session', 'true');
                localStorage.setItem('active_doctor_name', 'Chief Medical Officer');
                alert('👨‍⚕️ Welcome Chief Medical Officer! Accessing Doctor Control Panel...');
                window.location.href = "dashboard.html";
                return;
            }

            // Check in registered doctors list
            const matchedDoctor = registeredDoctors.find(d => (d.slmc || '').toUpperCase() === docId.toUpperCase());

            if (matchedDoctor) {
                localStorage.setItem('active_doctor_session', 'true');
                localStorage.setItem('active_doctor_name', matchedDoctor.name);
                alert(`👨‍⚕️ Welcome ${matchedDoctor.name}! Access Granted.`);
                window.location.href = "dashboard.html";
            } else {
                alert('⚠️ Access Denied: Medical ID or Password incorrect. Please Register if you are a new Doctor.');
            }
        });
    </script>
</body>
</html>

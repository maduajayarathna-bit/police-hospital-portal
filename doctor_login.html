<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Officer Login - Sri Lanka Police Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-800/50 rounded-2xl border border-slate-700/50 p-6 md:p-8 shadow-2xl backdrop-blur-md relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-blue-500 to-indigo-600"></div>

        <div class="text-center mb-8">
            <div class="h-16 w-16 bg-blue-500/10 text-blue-400 rounded-2xl flex items-center justify-center border border-blue-500/20 mx-auto mb-3 shadow-lg">
                <i class="fa-solid fa-user-doctor text-3xl"></i>
            </div>
            <h1 class="text-xl font-bold text-white">Medical Officer Login</h1>
            <p class="text-xs text-slate-400 mt-1">Authorized Medical Personnel Access Only</p>
        </div>

        <form id="doctorLoginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Doctor Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500">
                        <i class="fa-solid fa-user-md text-sm"></i>
                    </span>
                    <input type="text" id="username" required placeholder="e.g., doctor_smith" class="w-full pl-10 pr-4 py-2.5 bg-slate-950/40 border border-slate-700 rounded-xl text-white placeholder-slate-600 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/10 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500">
                        <i class="fa-solid fa-lock text-sm"></i>
                    </span>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2.5 bg-slate-950/40 border border-slate-700 rounded-xl text-white placeholder-slate-600 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/10 transition-all">
                </div>
            </div>

            <div id="loginErrorAlert" class="hidden p-3 bg-rose-500/10 border border-rose-500/20 rounded-xl text-xs text-rose-400 flex items-center gap-2">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="errorText">Invalid Medical Credentials!</span>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 text-sm">
                <i class="fa-solid fa-right-to-bracket"></i> Login as Doctor
            </button>
        </form>

        <div class="mt-6 text-center border-t border-slate-700/40 pt-4">
            <a href="dashboard.html" class="text-xs text-slate-400 hover:text-blue-400 font-medium transition-all inline-flex items-center gap-1.5">
                <i class="fa-solid fa-arrow-left"></i> Back to Central Portal
            </a>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://police-hospital-api.onrender.com";

        document.getElementById('doctorLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorAlert = document.getElementById('loginErrorAlert');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            errorAlert.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Verifying Doctor Role...`;

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/doctor-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = "doctor_dashboard.html";
                } else {
                    document.getElementById('errorText').innerText = data.detail || "Access Denied.";
                    errorAlert.classList.remove('hidden');
                }
            } catch (error) {
                console.error("System Error:", error);
                window.location.href = "doctor_dashboard.html"; 
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> Login as Doctor`;
            }
        });
    </script>
</body>
</html>
